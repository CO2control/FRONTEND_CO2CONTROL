<script>




    // Gráfico dashboard - home
    const ctx = document.getElementById('myChart');


    Chart.defaults.color = '#ffffff';

    new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['08:00', '09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00'],
    datasets: [
      {
        label: 'Nível de CO2',
        data: [12, 19, 3, 5, 2, 3,5,8,9],
        borderColor: 'red',
        pointBackgroundColor: '#fff',
        pointBorderWidth: 1,
        pointRadius: 5,
        tension: 0.4,
        fill: false,
        borderWidth: 3
      },
      {
        label: 'Recomendável', 
        data: [4, 4, 4, 4, 4, 4, 4, 4],
        borderColor: 'green', 
        borderWidth: 2,
        borderDash: [5, 5], // Linha tracejada
        pointRadius: 0,     
        pointHitRadius: 0,  
        fill: false
      },
      {
        label: 'Recomendável', 
        data: [2, 2, 2, 2, 2, 2, 2, 2, 2],
        borderColor: 'green', 
        borderWidth: 2,
        borderDash: [5, 5], // Linha tracejada

        pointHitRadius: 0,  
        fill: false
      }
    ]
  },
  options: {
    scales: {
      y: {
        beginAtZero: true
      }
    }
  }
});

</script>
