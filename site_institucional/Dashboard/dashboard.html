<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard CO2</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="container">

        <!-- SIDEBAR -->
        <div class="sidebar">

            <div class="logo">
                <img src="./assets/logo.png" alt="">
            </div>

            <div class="menu">
                <div class="item"><img src="./assets/iconNav.png" alt="">Dashboard</div>
                <div class="item"><img src="./assets/tanque.png" alt="">Tanques</div>
                <div class="item"><img src="./assets/alerta.png" alt="">Alertas</div>
                <div class="item"><img src="./assets/relatorio.png" alt="">Relatórios</div>
                <div class="item"><img src="./assets/historia.png" alt="">Histórico</div>
                <div class="item"><img src="./assets/Settings.png" alt="">Configurações</div>
                <div class="item"><img src="./assets/porta.png" alt="">Sair</div>
            </div>

            

        </div>

        <!-- MAIN -->
        <div class="main">

            <!-- KPIs -->
            <div class="kpis">

                <div class="kpi">
                    <div class="kpi-title">Tanques</div>
                    <div class="kpi-value">12</div>
                    <img src="./assets/wi-fi.png" alt="">
                </div>

                <div class="kpi">
                    <div class="kpi-title">Em Alerta</div>
                    <div class="kpi-value">3</div>
                    <img src="./assets/alertaColor.png" alt="">
                </div>

                <div class="kpi">
                    <div class="kpi-title">Nível Médio</div>
                    <div class="kpi-value">8.2%</div>
                    <div class="sinal">Bom</div>
                </div>

                <div class="kpi">
                    <div class="kpi-title">Alertas Hoje</div>
                    <div class="kpi-value">5</div>
                    <img src="./assets/alarme.png" alt="">
                </div>

            </div>

            <!-- CONTEÚDO -->
            <div class="content">

                <!-- GRÁFICOS -->
                <div class="charts">

                    <div class="chart">
                        <div class="titulo">Nível de CO2</div>
                        <canvas id="chart1"></canvas>
                    </div>

                    <div class="chart">
                        <div class="titulo">Variação</div>
                        <canvas id="chart2"></canvas>
                    </div>

                </div>

                <!-- ALERTAS -->
                <div class="alerts">

                    <div class="titulo">Alertas</div>

                    <div class="alert">CO2 Alto - Tanque #001</div>
                    <div class="alert">CO2 Alto - Tanque #002</div>
                    <div class="alert">CO2 Alto - Tanque #003</div>

                </div>

            </div>

        </div>

    </div>

    <script>
        Chart.defaults.color = '#ffffff';

        // GRÁFICO 1
        new Chart(document.getElementById('chart1'), {
            type: 'line',
            data: {
                labels: ['08:00', '09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00'],
                datasets: [{
                    label: 'CO2',
                    data: [0, 2, 3, 12, 19, 3, 5, 2, 3, 5, 8],
                    borderColor: 'red',
                    tension: 0.4,
                    pointRadius: 4,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: 'red',
                    pointBorderWidth: 1,
                    fill:true
                },{
                    label: 'Minimo Ideal',
                    data: [2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2],
                    borderColor: 'green',
                    tension: 0.4,   
                    pointBorderColor: 'green',
                    borderDash: [5,5],
                    pointBorderWidth: 2,
                    fill:true
                },{
                    label: 'Maximo Ideal',
                    data: [4,4, 4, 4, 4, 4, 4, 4, 4, 4, 4],
                    borderColor: 'green',
                    tension: 0.4,
                    pointBorderColor: 'green',
                    borderDash: [5,5],
                    pointBorderWidth: 2,
                    fill:true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });

        // GRÁFICO 2
        new Chart(document.getElementById('chart2'), {
            type: 'bar',
            data: {
                labels: ['T1', 'T2', 'T3', 'T4', 'T5'],
                datasets: [{
                    label: 'CO2 por Tanque',
                    data: [5, 8, 6, 10, 7],
                    backgroundColor: 'rgb(114, 47, 55)', 
                    borderColor: 'white',
                    borderWidth: 2,                           
                    borderRadius: 5

                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });
    </script>

</body>

</html>
