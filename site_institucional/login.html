<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CONTROL | Login</title>

    <link rel="stylesheet" href="css/login.css">
    <link rel="icon" href="assets/icon/favicon2.ico">
    <link rel="preconnect" href="https://fonts.gstatic.com">
</head>

<body>
    <div class="container">
        <div class="esquerda">
            <img src="./img/logo.png" alt="logo control" width="180px">
            <div class="texto1">
                <h1>BEM-VINDO <br> DE VOLTA!</h1>
            </div>
        </div>

        <div class="login">
            <h2>LOGIN</h2>
            <p>Faça o login para ter acesso ao sistema de monitoramento CO₂NTROL</p>
            <br><br>
            <div class="formulario">
                <div class="campo">
                    <span>CNPJ</span>
                    <input id="email_input" type="text">
                </div>
                <div class="campo">
                    <span>SENHA</span>
                    <input id="senha_input" type="password">
                </div>

                <button class="botao">ENTRAR</button>
                <h5 class="cadastre">Não possui uma conta? <a href="/site_institucional/cadastro.html">Cadastre-se</a></h5>
            </div>
        </div>
    </div>
</body>

</html>
