<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/chart.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="header">
        <div class="logo">
            <img src="img/logo copy.png" alt="Logo">
        </div>

        <div class="menu">
            <div class="navbar">INÍCIO</div>
            <div>SOLUÇÃO</div>
            <div>CALCULADORA</div>
            <div>SOBRE NÓS</div>
        </div>

        <div class="btn-client">ÁREA DO CLIENTE</div>
    </div>
    <div class="containerCharts">
        <div class="containerSensor">
            <div class="titleChart">
                <h1>Monitoramento - Sensor 1</h1>
                <span>Visão geral dos níveis de CO2</span>
            </div>
            <div class="chartContainer">
                <canvas id="chartCO2_1"></canvas>
            </div>
        </div>
        <div class="containerSensor">
            <div class="titleChart">
                <h1>Monitoramento - Sensor 2</h1>
                <span>Visão geral dos níveis de CO2</span>
            </div>
            <div class="chartContainer">
                <canvas id="chartCO2_2"></canvas>
            </div>
        </div>
    </div>
    <div class="kpisContainer">
        <div class="cardKpi">
            <span>Sensores online</span>
            <h4>2/2</h4>
        </div>
        <div class="cardKpi">
            <span>Alertas Críticos</span>
            <h4>3</h4>
        </div>
        <div class="cardKpi">
            <span>Armazenamentos ativos</span>
            <h4>2/2</h4>
        </div>
        <div class="cardKpi">
            <span>Nível médio de CO2</span>
            <h4>2</h4>
        </div>
    </div>
</body>

</html>
<script>
    new Chart(document.getElementById('chartCO2_1'), {
        type: 'line',
        options: {
            scales: {
                y: {
                    beginAtZero: true,
                    max: 100,
                    ticks: {
                        color: 'rgb(244,244,244)'
                    }
                },
                x: {
                    ticks: {
                        color: 'rgb(244,244,244)'
                    }
                },
            },
            layout: {
                padding: 10
            }
        },
        data: {
            labels: ['13:00', '13:10', '13:20', '13:30', '13:40', '13:50', '14:00', '14:10', '14:20', '14:30'],
            datasets: [
                {
                    label: 'Nível de CO2 (%)',
                    data: [20, 35, 30, 35, 34, 80, 35, 30, 25, 30, 35],
                    fill: false,
                    tension: 0.4,
                    cubicInterpolationMode: 'monotone',
                    borderWidth: 2,
                    borderColor: 'rgb(244,244,244)',
                    backgroundColor: 'rgb(144, 0, 0)',
                    pointHoverBackgroundColor: 'rgb(244, 244, 244)'
                },
                {
                    label: 'Máximo',
                    data: [40, 40, 40, 40, 40, 40, 40, 40, 40, 40],
                    borderWidth: 2,
                    fill: false,
                    pointRadius: 1,
                    borderColor: '#f4f4f4',
                    borderDash: [1, 10],
                    backgroundColor: 'rgb(244, 244, 244, 0.5)',
                    pointHoverBackgroundColor: 'rgb(244, 244, 244)'
                },
                {
                    label: 'Mínimo',
                    data: [20, 20, 20, 20, 20, 20, 20, 20, 20, 20],
                    borderWidth: 2,
                    fill: '-1',
                    pointRadius: 1,
                    borderColor: 'rgb(244, 244, 244)',
                    borderDash: [1, 10],
                    backgroundColor: 'rgb(244, 244, 244, 0.5)',
                    pointHoverBackgroundColor: 'rgb(244, 244, 244)'
                }
            ]
        }
    });
    new Chart(document.getElementById('chartCO2_2'), {
        type: 'line',
        options: {
            scales: {
                y: {
                    beginAtZero: true,
                    max: 100,
                    ticks: {
                        color: 'rgb(244,244,244)'
                    }
                },
                x: {
                    ticks: {
                        color: 'rgb(244,244,244)'
                    }
                },
            },
            layout: {
                padding: 10
            }
        },
        data: {
            labels: ['13:00', '13:10', '13:20', '13:30', '13:40', '13:50', '14:00', '14:10', '14:20', '14:30'],
            datasets: [
                {
                    label: 'Nível de CO2 (%)',
                    data: [20, 35, 39, 60, 34, 80, 35, 30, 35, 50, 30],
                    fill: false,
                    tension: 0.4,
                    cubicInterpolationMode: 'monotone',
                    borderWidth: 2,
                    borderColor: 'rgb(244,244,244)',
                    backgroundColor: 'rgb(144, 0, 0)',
                    pointHoverBackgroundColor: 'rgb(244, 244, 244)'
                },
                {
                    label: 'Máximo',
                    data: [40, 40, 40, 40, 40, 40, 40, 40, 40, 40],
                    borderWidth: 2,
                    fill: false,
                    pointRadius: 1,
                    borderColor: '#f4f4f4',
                    borderDash: [1, 10],
                    backgroundColor: 'rgb(244, 244, 244, 0.5)',
                    pointHoverBackgroundColor: 'rgb(244, 244, 244)'
                },
                {
                    label: 'Mínimo',
                    data: [20, 20, 20, 20, 20, 20, 20, 20, 20, 20],
                    borderWidth: 2,
                    fill: '-1',
                    pointRadius: 1,
                    borderColor: 'rgb(244, 244, 244)',
                    borderDash: [1, 10],
                    backgroundColor: 'rgb(244, 244, 244, 0.5)',
                    pointHoverBackgroundColor: 'rgb(244, 244, 244)'
                }
            ]
        }
    });

</script>
