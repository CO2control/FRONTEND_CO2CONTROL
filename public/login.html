<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CONTROL | Login</title>

    <link rel="stylesheet" href="css/login.css">
    <link rel="icon" href="assets/icon/favicon2.ico">
    <link rel="preconnect" href="https://fonts.gstatic.com">
</head>

<body>
    <div class="container">
        <div class="esquerda">
            <img src="./img/logo.png" alt="logo control" width="180px">
            <div class="texto1">
                <h1>BEM-VINDO <br> DE VOLTA!</h1>
            </div>
        </div>

        <div class="login">
            <h2>LOGIN</h2>
            <p>Faça o login para ter acesso ao sistema de monitoramento CO₂NTROL</p>
            <br><br>
            <div class="formulario">
                <div class="campo">
                    <span>Email</span>
                    <input id="email_input" type="text">
                    <span id="email_erro" class="erro"></span>
                </div>
                <div class="campo">
                    <span>Senha</span>
                    <input id="senha_input" type="password">
                    <span id="senha_erro" class="erro"></span>
                </div>

                <button class="botao" onclick="entrar()">ENTRAR</button>
                <div id="texto"></div>

                <h5 class="cadastre">Não possui uma conta? <a href="/site_institucional/cadastro.html">Cadastre-se</a>
                </h5>
            </div>
        </div>
    </div>
</body>

</html>

<script>
    function entrar() {

        let email = email_input.value;
        let senha = senha_input.value;

        let senhaTeste = 'julialima123';
        let emailTeste = 'julia.lima@sptech.school';

        let emailErro = document.getElementById("email_erro");
        let senhaErro = document.getElementById("senha_erro");


        emailErro.innerHTML = "";
        senhaErro.innerHTML = "";

        if (email == "" || senha == "") {
            if (email == "") {
                emailErro.innerHTML = "Preencha o email";
            }
            if (senha == "") {
                senhaErro.innerHTML = "Preencha a senha";
            }
            return false;
        }


        // if (email != emailTeste) {
        //     emailErro.innerHTML = "Email incorreto";
        //     return false;
        // }

        // else if (senha != senhaTeste) {
        //     senhaErro.innerHTML = "Senha incorreta";
        //     return false;
        // }

        let loginFeito = senha == senhaTeste && email == emailTeste

        // if(loginFeito){
        //     alert("Login realizado com sucesso!");
        //     window.location = './Dashboard/dashboard.html'
        // }

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: email,
                senhaServer: senha
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;


                    setTimeout(function () {
                        window.location = "./Dashboard/dashboard.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }
        }).catch(function (erro) {
            console.log(erro);
        })

        return false;


    }
</script>
